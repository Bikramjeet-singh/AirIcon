<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirIcon Waitlist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  max-width: 600px;
  padding: 20px;
}

h1 {
  font-size: 64px;
  font-weight: 600;
  margin-bottom: 10px;
}

p {
  font-size: 20px;
  color: #6e6e73;
  margin-bottom: 30px;
}

.email-box {
  display: flex;
  gap: 10px;
  justify-content: center;
}

input {
  padding: 14px;
  width: 260px;
  border-radius: 10px;
  border: 1px solid #d2d2d7;
  font-size: 16px;
}

button {
  padding: 14px 20px;
  border: none;
  border-radius: 10px;
  background: #1d1d1f;
  color: white;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.msg {
  margin-top: 15px;
  font-size: 14px;
  display: none;
}

.success { color: #28a745; }
.error { color: #ff3b30; }

.subtle {
  margin-top: 10px;
  font-size: 12px;
  color: #8e8e93;
}
</style>
</head>

<body>

<div class="container">
  <h1>AirIcon</h1>
  <p>Something in the air is about to change</p>

  <div class="email-box">
    <input id="email" type="email" placeholder="Enter your email">
    <button id="btn" onclick="submitEmail()">Get Early Access</button>
  </div>

  <div class="msg success" id="success">You're on the list 🚀</div>
  <div class="msg error" id="error"></div>

  <div class="subtle">No spam. Early builders only.</div>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbz350jLSKIOrv4tuqQwtLAM2ouFZJ2_h3-WdN4Q-g4rWXxkKQ4FKY5y9eLuiYndAcyE/exec";
async function submitEmail() {
  const email = document.getElementById("email").value;
  const btn = document.getElementById("btn");

  const success = document.getElementById("success");
  const error = document.getElementById("error");

  success.style.display = "none";
  error.style.display = "none";

  if (!email || !email.includes("@")) {
    error.innerText = "Enter a valid email";
    error.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Submitting...";

  try {
    const res = await fetch(url, {
      method: "POST",
      body: JSON.stringify({ email })
    });

    const text = await res.text();
    console.log("Response:", text);

    if (!res.ok) {
      throw new Error(text);
    }

    document.getElementById("email").value = "";
    success.style.display = "block";

  } catch (err) {
    console.log("Error:", err);
    error.innerText = err.message || "Something went wrong";
    error.style.display = "block";
  }

  btn.disabled = false;
  btn.innerText = "Get Early Access";
}
</script>

</body>
</html>
