<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirIcon</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 64px;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    p {
      font-size: 22px;
      color: #94a3b8;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .email-box {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    input {
      padding: 14px;
      border-radius: 10px;
      border: none;
      width: 260px;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 14px 24px;
      border-radius: 10px;
      border: none;
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .subtle {
      margin-top: 16px;
      font-size: 14px;
      color: #64748b;
    }

    footer {
      margin-top: 50px;
      font-size: 13px;
      color: #475569;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>AirIcon</h1>
    <p>An icon for smarter air.</p>

    <div class="email-box">
      <input type="email" placeholder="Enter your email" />
      <button>Get Early Access</button>
    </div>

    <div class="subtle">
      No spam. Early builders only.
    </div>

    <footer>
      © 2026 AirIcon
    </footer>
  </div>
</body>
</html>
