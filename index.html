<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirIcon — Something in the air is changing</title>

<!-- Favicons — auto-switches with system dark/light mode -->
<link rel="icon" type="image/svg+xml" href="/airlcon_favicon_dark.svg" media="(prefers-color-scheme: dark)"/>
<link rel="icon" type="image/svg+xml" href="/airlcon_favicon_light.svg" media="(prefers-color-scheme: light)"/>

<!-- Fallback for older browsers -->
<link rel="alternate icon" href="/airlcon_favicon_dark.svg"/>

<!-- Apple touch icon (iOS home screen) -->
<link rel="apple-touch-icon" href="/airlcon_favicon_dark.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,200;0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #111113;
    --white: #f5f5f7;
    --led: #00c8ff;
    --muted: rgba(245,245,247,0.45);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Mona Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* white spotlight behind AirIcon */
  body::before {
    content: '';
    position: fixed;
    top: -15vh; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 500px;
    background: radial-gradient(ellipse at 50% 38%,
      rgba(255,255,255,0.07) 0%,
      rgba(255,255,255,0.03) 35%,
      transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* vignette edges */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%,
      transparent 38%,
      rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* coming soon — fixed top center */
  header.top-bar {
    position: fixed;
    top: 28px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) forwards 0.05s;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: var(--led);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .led-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--led);
    box-shadow: 0 0 7px var(--led);
    animation: blink 2.6s ease-in-out infinite;
    flex-shrink: 0;
  }

  /* main content */
  .wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100%;
    padding: 0 24px;
  }

  /* TRIANGLE: controlled purely by font-size */

  /* tip — smallest */
  .wordmark {
    font-size: 64px;
    font-weight: 600;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--white);
    margin-bottom: 18px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) forwards 0.22s;
  }

  /* middle */
  .tagline {
    font-size: 20px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.5;
    letter-spacing: 0.2px;
    margin-bottom: 44px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) forwards 0.38s;
    white-space: nowrap;
  }

  .divider {
    width: 30px; height: 0.5px;
    background: rgba(255,255,255,0.1);
    margin: 0 auto 44px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) forwards 0.44s;
  }

  /* base — widest */
  .form-wrap {
    width: 526px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) forwards 0.52s;
  }

  .form-row {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.14);
    border-radius: 32px;
    padding: 5px 5px 5px 20px;
    transition: border-color 0.2s;
  }

  .form-row:focus-within {
    border-color: rgba(0,200,255,0.3);
  }

  .form-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 16px;
    font-weight: 300;
    color: var(--white);
    min-width: 0;
  }

  .form-row input::placeholder { color: rgba(245,245,247,0.22); }

  .form-row button {
    background: var(--white);
    color: #000;
    border: none;
    border-radius: 26px;
    padding: 13px 22px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }

  .form-row button:hover  { opacity: 0.82; }
  .form-row button:active { transform: scale(0.975); }
  .form-row button:disabled { opacity: 0.28; cursor: not-allowed; }

  .form-note {
    margin-top: 12px;
    font-size: 11px;
    font-weight: 300;
    color: rgba(245,245,247,0.16);
  }

  .msg { margin-top: 12px; font-size: 13px; font-weight: 300; display: none; }
  .success   { color: #30d158; }
  .error-msg { color: #ff453a; }

  footer {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    z-index: 1;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) forwards 0.75s;
  }

  footer p {
    font-size: 11px;
    font-weight: 300;
    color: rgba(245,245,247,0.16);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  @media (max-width: 480px) {
    .form-wrap { width: 100%; max-width: 360px; }
    .tagline { white-space: normal; font-size: 15px; }
    .wordmark { font-size: 44px; }
    .form-row { flex-direction: column; border-radius: 16px; padding: 12px 14px; gap: 8px; align-items: stretch; }
    .form-row button { border-radius: 12px; padding: 13px; font-size: 14px; }
  }
</style>
</head>
<body>

<header class="top-bar">
  <div class="eyebrow">
    <span class="led-dot"></span>
    Coming soon
  </div>
</header>

<div class="wrap">

  <h1 class="wordmark">AirIcon</h1>

  <p class="tagline">Something in the air is about to change.</p>

  <div class="divider"></div>

  <div class="form-wrap">
    <div class="form-row">
      <input id="email" type="email" placeholder="Your email address" autocomplete="email"/>
      <button id="btn" onclick="submitEmail()">Get early access</button>
    </div>
    <p class="form-note">No spam. Early access only.</p>
    <p class="msg success"   id="success">You're on the list — we'll be in touch.</p>
    <p class="msg error-msg" id="errmsg"></p>
  </div>

</div>

<footer>
  <p>© 2026 AirIcon</p>
</footer>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz350jLSKIOrv4tuqQwtLAM2ouFZJ2_h3-WdN4Q-g4rWXxkKQ4FKY5y9eLuiYndAcyE/exec";

async function submitEmail() {
  const emailEl = document.getElementById("email");
  const btn     = document.getElementById("btn");
  const success = document.getElementById("success");
  const errmsg  = document.getElementById("errmsg");
  const email   = emailEl.value.trim();

  success.style.display = "none";
  errmsg.style.display  = "none";

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errmsg.innerText = "Please enter a valid email.";
    errmsg.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Submitting…";

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ email })
    });
    if (!res.ok) throw new Error();
    emailEl.value = "";
    success.style.display = "block";
  } catch {
    errmsg.innerText = "Something went wrong. Please try again.";
    errmsg.style.display = "block";
  }

  btn.disabled = false;
  btn.innerText = "Get early access";
}

document.getElementById("email").addEventListener("keydown", e => {
  if (e.key === "Enter") submitEmail();
});
</script>
</body>
</html>
